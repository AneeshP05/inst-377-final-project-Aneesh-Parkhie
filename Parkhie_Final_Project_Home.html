<div class="box">
<h1>Weather Planner</h1>

<p>Enter a city or coordinates.</p>

<input id="cityInput" placeholder="City">
<input id="latInput" placeholder="Latitude">
<input id="lonInput" placeholder="Longitude">

<h2 id="locationName"></h2>
<p id="currentTemp"></p>
<p id="conditions"></p>

<div id="dailyForecast"></div>

<div id="map"></div>
